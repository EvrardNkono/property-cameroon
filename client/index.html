    />

    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    
    <!-- 🔥 Script de détection de langue (exécuté immédiatement) -->
    <script>
      (function() {
        // Détection de la langue depuis l'URL, localStorage ou navigateur
        const urlParams = new URLSearchParams(window.location.search);
        let lang = urlParams.get('lang');
        
        if (!lang) {
          lang = localStorage.getItem('preferredLanguage');
        }
        
        if (!lang) {
          const browserLang = navigator.language.split('-')[0];
          lang = browserLang === 'fr' ? 'fr' : 'en';
        }
        
        if (!['fr', 'en'].includes(lang)) {
          lang = 'en';
        }
        
        // Stocker la langue
        localStorage.setItem('preferredLanguage', lang);
        
        // Si pas de paramètre lang dans l'URL, ajouter une redirection silencieuse
        if (!urlParams.has('lang') && window.location.pathname === '/') {
          const newUrl = new URL(window.location.href);
          newUrl.searchParams.set('lang', lang);
          window.history.replaceState({}, '', newUrl);
        }
      })();
    </script>
  </head>
  <body>

  </body>
